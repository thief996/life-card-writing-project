<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>人生打怪圖鑑｜抽牌機</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="header-art.css" />
    <link rel="stylesheet" href="deck-art.css" />
  </head>
  <body>
    <header class="title-art" role="img" aria-label="人生打怪圖鑑彩色水墨風格抬頭圖"></header>

    <main class="app-shell">
      <section class="draw-panel ghost-panel" aria-labelledby="ghost-title">
        <div class="draw-copy">
          <p class="eyebrow">Ghost Deck</p>
          <h1 id="ghost-title">抽鬼怪</h1>
          <p class="intro">抽出今天要面對的怪，先看見阻力，再決定怎麼破關。</p>
          <div class="draw-actions">
            <button class="draw-button ghost-button" type="button" data-draw-button="ghost">抽鬼怪卡</button>
            <span class="draw-status" data-draw-status="ghost">尚未抽鬼怪</span>
          </div>
        </div>

        <article class="result-card ghost-card" data-result-card="ghost" aria-live="polite">
          <div class="card-aura"></div>
          <p class="card-type">鬼怪卡</p>
          <h2 data-card-name="ghost">今天的怪還沒現身</h2>
          <p data-card-message="ghost">按下抽鬼怪卡，看看今天是哪一種卡關狀態出來巡邏。</p>
        </article>
      </section>

      <section class="draw-panel skill-panel" aria-labelledby="skill-title">
        <div class="draw-copy">
          <p class="eyebrow">Skill Deck</p>
          <h2 id="skill-title">抽技能</h2>
          <p class="intro">抽出今天可使用的招式，讓你不是硬扛，而是帶著工具上場。</p>
          <div class="draw-actions">
            <button class="draw-button skill-button" type="button" data-draw-button="skill">抽技能卡</button>
            <span class="draw-status" data-draw-status="skill">尚未抽技能</span>
          </div>
        </div>

        <article class="result-card skill-card" data-result-card="skill" aria-live="polite">
          <div class="card-aura"></div>
          <p class="card-type">技能卡</p>
          <h2 data-card-name="skill">今天的技能尚未解鎖</h2>
          <p data-card-message="skill">按下抽技能卡，取得一個今天可以立刻使用的小招式。</p>
        </article>
      </section>
    </main>

    <script src="scripts/draw.js"></script>
  </body>
</html>
